<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Axiom Odyssey">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E27"/>
      <stop offset="0.55" stop-color="#1A1140"/>
      <stop offset="1" stop-color="#2B1A5A"/>
    </linearGradient>
    <linearGradient id="ring" x1="820" y1="60" x2="1180" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#43D6C4"/>
    </linearGradient>
    <linearGradient id="planet" x1="940" y1="120" x2="1080" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A6BFF"/>
      <stop offset="1" stop-color="#3A2A7A"/>
    </linearGradient>
    <linearGradient id="word" x1="80" y1="150" x2="740" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C7BEFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" rx="18" fill="url(#bg)"/>
  <ellipse cx="1010" cy="190" rx="360" ry="300" fill="url(#glow)"/>

  <!-- starfield -->
  <g fill="#FFFFFF">
    <circle cx="120" cy="70" r="1.6" opacity="0.8"/>
    <circle cx="300" cy="300" r="1.2" opacity="0.6"/>
    <circle cx="520" cy="60" r="1.4" opacity="0.7"/>
    <circle cx="240" cy="200" r="1" opacity="0.5"/>
    <circle cx="670" cy="300" r="1.3" opacity="0.6"/>
    <circle cx="80" cy="250" r="1.1" opacity="0.5"/>
    <circle cx="430" cy="250" r="1" opacity="0.45"/>
    <circle cx="600" cy="120" r="1.2" opacity="0.55"/>
    <circle cx="760" cy="80" r="1.5" opacity="0.7"/>
    <circle cx="1180" cy="300" r="1.3" opacity="0.6"/>
    <circle cx="1220" cy="90" r="1.1" opacity="0.5"/>
  </g>

  <!-- planet + orbit -->
  <g transform="translate(1010 190)">
    <ellipse cx="0" cy="0" rx="185" ry="70" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.85" transform="rotate(-24)"/>
    <circle cx="0" cy="0" r="82" fill="url(#planet)"/>
    <path d="M -60 -30 A 82 82 0 0 1 66 -48" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <circle cx="151" cy="-68" r="5" fill="#43D6C4" transform="rotate(-24)"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="180" font-family="'Segoe UI', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="2" fill="url(#word)">AXIOM</text>
  <text x="80" y="270" font-family="'Segoe UI', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="2" fill="url(#word)">ODYSSEY</text>

  <!-- accent bar + tagline -->
  <rect x="84" y="300" width="52" height="5" rx="2.5" fill="#43D6C4"/>
  <text x="150" y="309" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="500" fill="#B7AEE8">Minecraft 1.7.10 · современная Java 21–25</text>
</svg>
